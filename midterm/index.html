<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MLBB Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ml-bg: #041021;
            --card-blue: #0b1a33;
            --banner-blue: #133a75;
            --accent-cyan: #5ce1e6;
        }

        body {
            background-color: var(--ml-bg);
            background-image: radial-gradient(circle at 50% 0%, #0d325e 0%, #041021 80%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px;
        }

        .dashboard-container { max-width: 1000px; margin: auto; }

        /* NAVBAR TABS */
        .nav-tabs-custom { display: flex; gap: 10px; margin-bottom: 25px; }
        .nav-tab-item {
            background: rgba(255,255,255,0.05);
            padding: 10px 35px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .nav-tab-item.active { background: #132e5e; border-bottom: 3px solid white; }

        /* BANNER */
        .banner {
            background: var(--banner-blue);
            border-radius: 35px;
            height: 380px; 
            display: flex;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }

        .banner-content { 
            flex: 1; 
            padding: 50px; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }

        /* UPDATED: BANNER IMAGE ADJUSTMENT ZONE */
        .banner-hero-render {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%; /* Adjust this to change how much space the hero takes */
            height: 100%;
            object-fit: cover;
            object-position: 70% 13%; /* Adjust these % to move the hero left/right and up/down */
            /* Mask creates the smooth fade into the blue background */
            mask-image: linear-gradient(to left, black 75%, transparent 100%);
            -webkit-mask-image: linear-gradient(to left, black 75%, transparent 100%);
        }

        /* LOWER CARDS */
        .section-card { background: var(--card-blue); border-radius: 30px; padding: 25px; height: 350px; }
        .section-title { text-align: center; font-size: 1.1rem; margin-bottom: 20px; opacity: 0.9; }

        /* FEATURED GRID */
        .artwork-display { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .artwork-item {
            border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 1/1;
            background: #000; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }
        .artwork-item img { width: 100%; height: 100%; object-fit: cover; }
        .hero-name-overlay {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7);
            font-size: 0.65rem; padding: 2px 0; text-align: center;
        }

        /* ATTRIBUTES BAR */
        .attr-row { margin-bottom: 18px; }
        .attr-label { font-size: 0.85rem; color: #a0aec0; margin-bottom: 6px; }
        .attr-bar-bg { background: #1a3a6d; height: 14px; border-radius: 2px; }
        .attr-bar-fill { height: 100%; background: linear-gradient(90deg, #5ce1e6, #38b2ac); border-radius: 2px; }

        .btn-read-more {
            background: linear-gradient(to right, #3b82f6, #2563eb);
            border: none; color: white; padding: 8px 35px; border-radius: 20px; font-size: 0.9rem; width: fit-content;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="nav-tabs-custom">
        <div class="nav-tab-item active">HOME</div>
        <div class="nav-tab-item">HEROES</div>
        <div class="nav-tab-item">ARTWORK</div>
    </div>

    <div class="banner">
        <div class="banner-content">
            <p class="text-info mb-0" id="bannerRole">Support</p>
            <p class="text-info opacity-75 small mb-1">Crowd Control/Support</p>
            <h1 class="display-4 fw-bold mb-3" id="bannerName" style="line-height: 1;">Marcel</h1>
            <hr style="width: 200px; border-top: 2px solid white; opacity: 0.3; margin: 10px 0 20px 0;">
            <p class="small opacity-75 mb-4" style="max-width: 380px;">
                "Hailing from House Paxley, he is an elegant, mysterious, and bizarre artist whose split soul has fused with his camera."
            </p>
            <button class="btn-read-more">Read More</button>
        </div>
        <img src="https://akmweb.youngjoygame.com/web/svnres/img/mlbb/homepage_2_1_60_2/100_dd980a8816698f1503cdb76201d17dd0.png" id="bannerImg" class="banner-hero-render">
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="section-card">
                <h6 class="section-title">Featured Heroes</h6>
                <div class="artwork-display">
                    <div class="artwork-item" onclick="updateBanner('Obsidia', 'Marksman', 'https://akmweb.youngjoygame.com/web/svnres/img/mlbb/homepage_2_1_18/100_92bcc9ad2c4c8165a888d34f086a4d28.png')">
                        <img src="https://akmweb.youngjoygame.com/web/svnres/img/mlbb/homepage_2_1_18/100_92bcc9ad2c4c8165a888d34f086a4d28.png">
                        <div class="hero-name-overlay">Obsidia</div>
                    </div>
                    <div class="artwork-item" onclick="updateBanner('Xavier', 'Mage', 'https://akmweb.youngjoygame.com/web/svnres/img/mlbb/homepage_2_1_18_2/100_50a5b0dd98ed2378d9f618e5ef0d47b2.png')">
                        <img src="https://akmweb.youngjoygame.com/web/svnres/img/mlbb/homepage_2_1_18_2/100_50a5b0dd98ed2378d9f618e5ef0d47b2.png">
                        <div class="hero-name-overlay">Xavier</div>
                    </div>
                    <div class="artwork-item" onclick="updateBanner('Zetian', 'Mage', 'https://akmweb.youngjoygame.com/web/svnres/img/mlbb/homepage_1_9_90/100_22dc8b16ea98a735027c3141b74ef841.png')">
                        <img src="https://akmweb.youngjoygame.com/web/svnres/img/mlbb/homepage_1_9_90/100_22dc8b16ea98a735027c3141b74ef841.png">
                        <div class="hero-name-overlay">Zetian</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="section-card">
                <h6 class="section-title">Attributes</h6>
                <div class="attr-row">
                    <div class="attr-label">Durability</div>
                    <div class="attr-bar-bg"><div class="attr-bar-fill" style="width: 82%;"></div></div>
                </div>
                <div class="attr-row">
                    <div class="attr-label">Offense</div>
                    <div class="attr-bar-bg"><div class="attr-bar-fill" style="width: 48%;"></div></div>
                </div>
                <div class="attr-row">
                    <div class="attr-label">Ability Effects</div>
                    <div class="attr-bar-bg"><div class="attr-bar-fill" style="width: 95%;"></div></div>
                </div>
                <div class="attr-row">
                    <div class="attr-label">Difficulty</div>
                    <div class="attr-bar-bg"><div class="attr-bar-fill" style="width: 65%;"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateBanner(name, role, imgSrc) {
        document.getElementById('bannerImg').src = imgSrc;
        document.getElementById('bannerName').innerText = name;
        document.getElementById('bannerRole').innerText = role;
    }
</script>

</body>
</html>
