<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Ashlley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f1c33;
            --card-bg: #1a2c4d;
            --ml-blue: #4da6ff;
            --ml-gold: #c6a34f;
            --text-main: #e0e6ed;
        }

        body {
            background-color: var(--bg-dark) !important;
            background-image: radial-gradient(circle at center, #1a2c4d 0%, #0a111f 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
        }

        .profile-frame {
            position: relative;
            width: 180px; 
            height: 180px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            overflow: hidden;
            background-color: var(--card-bg);
            box-shadow: 0 0 15px rgba(77, 166, 255, 0.5);
        }

        /* ✅ UPDATED FRAME */
        .frame-border {
    position: absolute;
    width: 150%;
    height: 150%;
    top: 50%;
    left: 50%;
    z-index: 1;
    object-fit: cover;

    /* PERFECT CENTER + NO GAPS */
    transform: translate(-50%, -52%) scale(1.3);
}
        
        .profile-img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            z-index: 2;
            border: 8px solid var(--card-bg);
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid rgba(198, 163, 79, 0.3);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
        }

        .profile-name {
            font-weight: bold;
            color: #fff;
            font-size: 1rem;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .level-box {
            background: linear-gradient(to right, #2b4b8d, #1a2c4d);
            border: 1px solid var(--ml-blue);
            color: var(--ml-blue);
            display: inline-block;
            padding: 2px 15px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
        }

        .tab-btn {
            background: #2c4169;
            border: none;
            color: #a0aec0;
            padding: 10px 20px;
            font-weight: bold;
            flex-grow: 1;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
            cursor: pointer;
        }

        .tab-btn.active {
            background: linear-gradient(to bottom, #4a6fa5, #2b4b8d);
            color: white;
            border-bottom: 3px solid var(--ml-blue);
        }

        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container my-5">
    <div class="row g-4 justify-content-center">
        
        <div class="col-12 col-md-4 col-lg-3">
            <div class="profile-card shadow-sm h-100">
                <div class="profile-frame">
                    <img src="frame.jpg" class="frame-border" alt="Fantasy Border">
                    <img src="profilepic.jpg" class="profile-img" alt="Profile Picture">
                </div>
                <div class="profile-name">ASHLLEY NICHOLE A. MANGABAT</div>
                <div class="level-box">DIT 2-1</div>
            </div>
        </div>

        <div class="col-12 col-md-8 col-lg-7">
            <div class="content-card shadow-sm h-100">
                <div class="tabs d-flex mb-4">
                    <button class="tab-btn active" data-tab="about">ABOUT</button>
                    <button class="tab-btn" data-tab="portfolio">PORTFOLIO</button>
                    <button class="tab-btn" data-tab="education">EDUCATION</button>
                </div>

                <div class="panel active" id="about">
                    <div style="background: #13223f; padding: 25px; border-radius: 8px;">
                        <h1 style="color:var(--ml-gold); font-size:1.5rem;">About Me</h1>
                        <p>I am Ashlley. I enjoy watching anime, playing games, and learning new things.</p>
                    </div>
                </div>

                <div class="panel" id="portfolio">
                    <div style="background: #13223f; padding: 25px; border-radius: 8px;">
                        <h1>Portfolio</h1><p>Coming Soon...</p>
                    </div>
                </div>

                <div class="panel" id="education">
                    <div style="background: #13223f; padding: 25px; border-radius: 8px;">
                        <h1>Education</h1><p>DIT 2-1 Student</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.querySelectorAll('.tab-btn').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            button.classList.add('active');
            document.getElementById(button.dataset.tab).classList.add('active');
        });
    });
</script>
</body>
</html>
