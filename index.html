<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Ashlley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f1c33;
            --card-bg: #1a2c4d;
            --panel-bg: #13223f;
            --ml-gold: #c6a34f;
            --ml-blue: #4da6ff;
            --tab-inactive: #2c4169;
            --text-main: #e0e6ed;
        }

        body {
            background-color: var(--bg-dark) !important;
            background-image: radial-gradient(circle at center, #1a2c4d 0%, #0a111f 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- FIXED BORDER & PHOTO LAYERING --- */
        .profile-frame {
            position: relative;
            width: 180px; 
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .frame-border {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1; /* Border is now the BACK layer */
            object-fit: contain;
            /* Added a glow to the frame */
            filter: drop-shadow(0 0 10px var(--ml-blue));
        }

        .profile-img {
            width: 120px; /* Sized to fit in the center of the border */
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            z-index: 2; /* Photo is now the FRONT layer */
            border: 3px solid var(--ml-gold); /* Gold rim to match the game style */
        }

        /* --- UI DESIGN --- */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid rgba(198, 163, 79, 0.3);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
        }

        .profile-name {
            font-weight: bold;
            color: #fff;
            font-size: 1rem;
            text-transform: uppercase;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .level-box {
            background: linear-gradient(to right, #2b4b8d, #1a2c4d);
            border: 1px solid var(--ml-blue);
            color: var(--ml-blue);
            display: inline-block;
            padding: 2px 15px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
        }

        .tab-btn {
            background: var(--tab-inactive);
            border: none;
            color: #a0aec0;
            padding: 10px 20px;
            font-weight: bold;
            flex-grow: 1;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
            transition: 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(to bottom, #4a6fa5, #2b4b8d);
            color: white;
            border-bottom: 3px solid var(--ml-blue);
        }

        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }

        .about-box {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 25px;
        }

        .quest-box {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--ml-gold);
            padding: 15px;
            margin-top: 20px;
        }

        h1 { color: var(--ml-gold); font-size: 1.5rem; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container my-5">
    <div class="row g-4 justify-content-center">
        
        <div class="col-12 col-md-4 col-lg-3">
            <div class="profile-card shadow-sm h-100">
                <div class="profile-frame">
                    <img src="frame.jpg" class="frame-border" alt="Fantasy Border">
                    <img src="profilepic.jpg" class="profile-img" alt="Profile Picture">
                </div>
                <div class="profile-name">ASHLLEY NICHOLE A. MANGABAT</div>
                <div class="level-box">DIT 2-1</div>
            </div>
        </div>

        <div class="col-12 col-md-8 col-lg-7">
            <div class="content-card shadow-sm h-100">
                <div class="tabs d-flex mb-4">
                    <button class="tab-btn active" data-tab="about">ABOUT</button>
                    <button class="tab-btn" data-tab="portfolio">PORTFOLIO</button>
                    <button class="tab-btn" data-tab="education">EDUCATION</button>
                </div>

                <div class="panel active" id="about">
                    <div class="about-box">
                        <h1>About Me</h1>
                        <p>I am Ashlley. I enjoy watching anime, playing games, and learning new things.</p>
                        <div class="quest-box">
                            <h5 class="fw-bold" style="color:var(--ml-gold)">GOALS:</h5>
                            <ul class="mb-0">
                                <li>Graduate College</li>
                                <li>Earn money for family</li>
                                <li>Build dream house</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="panel" id="portfolio">
                    <div class="about-box"><h1>Portfolio</h1><p>Coming Soon...</p></div>
                </div>

                <div class="panel" id="education">
                    <div class="about-box">
                        <h1>Education</h1>
                        <div class="quest-box">
                            <ul class="mb-0">
                                <li>DIT 2-1 Student</li>
                                <li>College Studies</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.querySelectorAll('.tab-btn').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            button.classList.add('active');
            document.getElementById(button.dataset.tab).classList.add('active');
        });
    });
</script>
</body>
</html>
