<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Ashlley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body class="d-flex align-items-center min-vh-100">

    <div class="container my-5">
        <div class="row g-4 justify-content-center">

            <div class="col-12 col-md-4 col-lg-3">
                <div class="profile-card shadow-sm h-100">
                    <div class="profile-frame">
                        <img src="frame.png" class="frame-border" alt="Fantasy Border">
                        <img src="https://github.com/ashlea1430/ashlea1430.github.io/blob/main/profilepic.jpg?raw=true"
                            class="profile-img" alt="Profile Picture">
                    </div>
                    <div class="profile-name">ASHLLEY NICHOLE A. MANGABAT</div>
                    <div class="level-box">DIT 2-1</div>
                </div>
            </div>

            <div class="col-12 col-md-8 col-lg-7">
                <div class="content-card shadow-sm h-100">
                    <div class="tabs d-flex mb-4">
                        <button class="tab-btn active" data-tab="about">ABOUT</button>
                        <button class="tab-btn" data-tab="portfolio">PORTFOLIO</button>
                        <button class="tab-btn" data-tab="education">EDUCATION</button>
                    </div>

                    <div class="panel active" id="about">
                        <div style="background: #13223f; padding: 25px; border-radius: 8px;">
                            <h1 style="color:var(--ml-gold); font-size:1.5rem;">About Me</h1>
                            <p>I am Ashlley. I enjoy watching anime, playing games, and learning new things.</p>
                        </div>
                    </div>

                    <div class="panel" id="portfolio">
                        <div style="background: #13223f; padding: 25px; border-radius: 8px;">
                            <h1 style="color:var(--ml-gold); font-size:1.5rem;">Activities</h1>

                            <div class="p-3 mb-3 border-start border-4"
                                style="background: rgba(255,255,255,0.03); border-color: var(--ml-blue) !important; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong
                                        style="color: var(--ml-blue); text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;">
                                        A02 - Hardware Electronic Device Showcase
                                    </strong>
                                </div>
                                <a href="https://ashlea1430.github.io/A02/index.html" target="_blank"
                                    rel="noopener noreferrer"
                                    style="background: var(--ml-blue); color: white; padding: 6px 20px; border-radius: 4px; font-size: 0.7rem; text-decoration: none; transition: 0.3s; box-shadow: 0 0 15px rgba(77, 166, 255, 0.2); font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">
                                    DEPLOY ➔
                                </a>
                            </div>
                            <div class="p-3 mb-3 border-start border-4"
                                style="background: rgba(255,255,255,0.03); border-color: var(--ml-blue) !important; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong
                                        style="color: var(--ml-blue); text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;">
                                        Midterm - MLBB API
                                    </strong>
                                </div>
                                <a href="https://ashlea1430.github.io/midterm/index.html" target="_blank"
                                    rel="noopener noreferrer"
                                    style="background: var(--ml-blue); color: white; padding: 6px 20px; border-radius: 4px; font-size: 0.7rem; text-decoration: none; transition: 0.3s; box-shadow: 0 0 15px rgba(77, 166, 255, 0.2); font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">
                                    DEPLOY ➔
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="panel" id="education">
                        <div style="background: #13223f; padding: 25px; border-radius: 8px;">
                            <h1 style="color:var(--ml-gold); font-size:1.5rem;">Education</h1>
                            <p>DIT 2-1 Student</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
